services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: sherlock-postgres
    environment:
      POSTGRES_USER: sherlock
      POSTGRES_PASSWORD: sherlock_local_dev
      POSTGRES_DB: sherlock
    ports:
      - "5433:5432"
    volumes:
      - sherlock_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sherlock -d sherlock"]
      interval: 2s
      timeout: 5s
      retries: 10

volumes:
  sherlock_pg_data:
